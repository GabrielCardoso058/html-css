<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desafio da tabela de notas</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        th {
            background-color: gray;
            color: white;
        }

        td {
            text-align: center;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            width: 100px;
        }

        .materias {
            text-align: left;
        }

        .media {
            text-align: left;
            background-color: gray;
            color: white;
        }

    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="row">Area</th>
                <th rowspan="2" scope="row">Disciplinas</th>
                <th colspan="2" scope="rowgroup">notas</th>
                <th rowspan="2" scope="row">Media</th>
            </tr>
            <tr>
                <th scope="row">Nota 1</th>
                <th scope="row">Nota 2</th>
            </tr>
            <tr>
                <td rowspan="4">Exatas</td>
                <td class="materias">Matematica</td>
                <td>10</td>
                <td>10</td>
                <td>10</td>
            </tr>
            <tr>
                <td class="materias">Fisica</td>
                <td>10</td>
                <td>10</td>
                <td>10</td>
            </tr>
            <tr>
                <td class="materias">Quimica</td>
                <td>10</td>
                <td>10</td>
                <td>10</td>
            </tr>
            <tr>
                <td class="materias">Biologia</td>
                <td>10</td>
                <td>10</td>
                <td>10</td>
            </tr>
        </thead>

        <thead>
            <tr>
                <td colspan="5" class="media">Media de Exatas</td>
            </tr>
            <tr>
                <td rowspan="2">Humanas</td>
                <td class="materias">Historia</td>
                <td>10</td>
                <td>10</td>
                <td>10</td>
            </tr>
            <tr>
                <td class="materias">Geografia</td>
                <td>10</td>
                <td>10</td>
                <td>10</td>
            </tr>
            <tr>
                <td colspan="5" class="media">Media de Humanas</td>
            </tr>
        </thead>
    </table>
    
</body>
</html>
